c3po:
  image:
    imagePullPolicy: Always
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
  service:
    type: ClusterIP
app:
  add_certificate: true
  certificate_arn: arn:aws:acm:us-west-2:123456789012:certificate/placeholder-certificate-id

service_account:
  name: generic-genai-app
  role: arn:aws:iam::123456789012:role/generic-dev-workspace-role

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3   
  successThreshold: 3

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 3
  timeoutSeconds: 5

autoscaling:
  enabled: true
  
env:
  ALB_NAME: "generic-genai-app"
  EKS_NAMESPACE: "generic-workspace"
  OKTA_DOMAIN: "https://okta.example.com"
  OKTA_CLIENT_ID: "placeholder-okta-client-id"
  CLIENT_BASE_URL: "https://app.example.com"
  OKTA_REDIRECT_URI: "https://app.example.com/auth/oauth/okta/callback"
  OKTA_ISSUER : "https://okta.example.com/oauth2/default"
  OKTA_AUDIENCE : "api://default"
  OKTA_USER_INFO_ENDPOINT : "https://okta.example.com/oauth2/v1/userinfo"
  OKTA_TOKEN_ENDPOINT : "https://okta.example.com/oauth2/v1/token"
  OKTA_AUTHORIZATION_ENDPOINT : "https://okta.example.com/oauth2/v1/authorize"
  OKTA_OIDC_METADATA_URL: "https://okta.example.com/.well-known/openid-configuration"
  ENV: "dev"
  DATABRICKS_HOST: "https://databricks.example.com"
  DATABRICKS_SERVER_HOSTNAME: "databricks.example.com"
  DATABRICKS_HTTP_PATH: "/sql/1.0/warehouses/placeholder-warehouse-id"
  SECRET_NAME: "generic-workspace/databricks-pat"
  MODEL: "us.amazon.nova-pro-v1:0"
  MODEL_BASE_URL: "https://databricks.example.com/serving-endpoints"
  PROVIDER: "bedrock"
  WORKSPACE_NAME: "generic-workspace"
  WORKSPACE_BUCKET_NAME: "generic-app-workspace-bucket"
  S3_BUCKET_NAME: "generic-app-workspace-bucket"
  AGENT_BASE_PORT: "8001"
  AGENT_BASE_URL: "generic-genai-app"
  DEFAULT_USER:
  DOMAIN: "oncology"
  DYNATRACE_ENDPOINT: "https://dynatrace.example.com/api/v2/otlp"
  APP_SECRET_NAME: "generic-workspace/app-secret"
  APPLICATION_NAME: "GENAI_APP_DEV"
  OKTA_ADMIN_GROUP: "APP_genai_app_admin_user"
  OKTA_USER_GROUP: "APP_genai_app_user"
  CHAT_MANAGER_BASE_URL: "generic-genai-app-chat-mgr"
  CHAT_MANAGER_PORT: "8001"
  VITE_CHAT_MGR_SECRET: "http://generic-genai-app-chat-mgr:8001"
  VITE_ADMIN_SECRET: "http://generic-genai-app-admin:8001"
  VITE_OKTA_CLIENT_ID: "placeholder-okta-client-id"
  VITE_OKTA_AUTH_URL: "https://okta.example.com/oauth2/v1/authorize"
  VITE_OKTA_REDIRECT_URI: "https://app.example.com/auth/oauth/okta/callback"
  VITE_ADMIN_AD_GROUP: "APP_genai_app_admin_user"
  VITE_APP_TITLE: "GenAI-ChatBot"
  VITE_SUPPORT_EMAIL: support@example.com
  INDEX_NAME_PMR: "generic-workspace__pmr"
  OPENSEARCH_HOST_URL_PMR: "https://opensearch.example.com"
  OPENSEARCH_REGION: "us-west-2"
  NLQ_JSON_LIMIT: 100
  ENABLE_PROMPT_CACHING: "true"
  LANGGRAPH_MAX_CONCURRENCY: 16
  ####################################
  # Feature flag for source selector dropdown
  ####################################
  VITE_ENABLE_SOURCE_SELECTOR: "true"
  SUB_AGENT_MAPPING: "system_prompts/config_source_mapping.json"
  ####################################
  DISABLE_USER_GROUP_VALIDATION: "false"
  ENABLE_LATENCY_OPTIMIZED_INFERENCE: "true"
  NLQ_MAX_TOKENS: "2000"

