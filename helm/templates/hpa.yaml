apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: commercial-us-sbx-iidd-genai-admin-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: commercial-us-sbx-iidd-genai-admin
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 60
---
